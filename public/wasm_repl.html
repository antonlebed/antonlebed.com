<!DOCTYPE html>
<!-- CC0 1.0 Universal - No Rights Reserved - antonlebed.com -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.ax WASM REPL — Compile & Run in Browser</title>
<link rel="stylesheet" href="nav-critical.css">
<script src="ax2.js"></script>
<style>
body { font-family: monospace; background: #111; color: #eee; margin: 0; padding: 20px; }
h1 { color: #f80; font-size: 1.4em; }
.panel { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 15px; margin: 10px 0; }
.gold { color: #ffd700; } .green { color: #50fa7b; } .cyan { color: #0ff; } .dim { color: #666; }
textarea { background: #0d0d18; color: #50fa7b; border: 1px solid #333; border-radius: 6px;
  padding: 12px; font-family: 'Cascadia Code','Fira Code',monospace; font-size: 14px;
  width: 100%; height: 250px; resize: vertical; tab-size: 2; outline: none; box-sizing: border-box; }
textarea:focus { border-color: #f80; }
pre { white-space: pre-wrap; word-break: break-word; }
#output { min-height: 120px; font-size: 14px; line-height: 1.6; }
button { background: #1a3a1a; color: #50fa7b; border: 1px solid #50fa7b; padding: 10px 20px;
  border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 14px; font-weight: bold; }
button:hover { background: #2a5a2a; }
button:disabled { opacity: 0.5; cursor: wait; }
.stat { display: inline-block; background: #1a2a1a; border: 1px solid #3a5a3a;
  border-radius: 4px; padding: 4px 10px; margin: 4px; font-size: 13px; }
select { background: #1a1a2e; color: #eee; border: 1px solid #333; padding: 8px;
  border-radius: 4px; font-family: monospace; }
</style>
</head>
<body>
<h1>.ax <span class="gold">WASM REPL</span></h1>
<p>Type .ax code. Compile to <span class="green">WebAssembly</span> in your browser. Run native.</p>
<p class="dim">Pipeline: your code -> tokenizer.ax -> parser.ax -> wasm_emit.ax -> WASM binary -> execute</p>

<div class="panel">
<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
  <button id="btn-run" onclick="compileAndRun()">Compile & Run</button>
  <select id="examples" onchange="loadExample()">
    <option value="">-- examples --</option>
    <option value="hello">Hello World</option>
    <option value="fib">Fibonacci</option>
    <option value="crt">CRT Channels</option>
    <option value="gcd">GCD + Ring Powers</option>
  </select>
  <span id="status" class="dim"></span>
</div>
<textarea id="code" spellcheck="false">/* Hello from the WASM REPL! */
fn double(x) = x + x
show "sigma/sigma = sigma"
show double(21)</textarea>
</div>

<div class="panel">
<h2 style="color:#fb0;font-size:1.1em;margin:0 0 8px">Output</h2>
<div id="stats"></div>
<pre id="output" class="green">Click "Compile & Run"...</pre>
</div>

<script>
const EXAMPLES = {
  hello: `/* Hello World */
show "sigma/sigma = sigma"
let x = 42
show "The answer is \${x}"
show x + x`,
  fib: `/* Fibonacci in WASM */
fn fib(n) = (
  if n < 2 then n
  else (
    mut a = 0; mut b = 1; mut i = 2;
    while i <= n do (
      let t = a + b in
      mut a = b; mut b = t; mut i = i + 1
    ); b
  )
)
show "fib(10):"
show fib(10)
show "fib(20):"
show fib(20)`,
  crt: `/* CRT Channel Decomposition */
let x = 42
show "x = 42"
show "x.D (mod 8) ="
show x.D
show "x.K (mod 9) ="
show x.K
show "x.E (mod 25) ="
show x.E
show "x.b (mod 49) ="
show x.b
show "x.L (mod 11) ="
show x.L`,
  gcd: `/* GCD and Ring Powers */
fn gcd(a, b) = if b == 0 then a else gcd(b, a % b)
fn ring_pow(base, exp) = (
  if exp == 0 then 1
  else if exp == 1 then base
  else (
    let half = ring_pow(base, exp / 2) in
    if exp % 2 == 0 then half * half
    else base * (half * half)
  )
)
show "gcd(42, 30):"
show gcd(42, 30)
show "2^10 (mod 970200):"
show ring_pow(2, 10)`
};

let stdlibSrc = null;
let compilerReady = false;

async function loadCompiler() {
  const status = document.getElementById('status');
  status.textContent = 'Loading compiler...';
  /* Try same-directory first (deployed), then ../code/stdlib/ (local dev) */
  async function tryFetch(name) {
    let r = await fetch(name);
    if (!r.ok) r = await fetch('../code/stdlib/' + name);
    if (!r.ok) throw new Error('Cannot load ' + name);
    return r.text();
  }
  const [tok, par, emit] = await Promise.all([
    tryFetch('tokenizer.ax'),
    tryFetch('parser.ax'),
    tryFetch('wasm_emit.ax')
  ]);
  stdlibSrc = tok + '\n' + par + '\n' + emit;
  compilerReady = true;
  status.textContent = 'Compiler ready (' + stdlibSrc.length + ' chars)';
}

function loadExample() {
  const sel = document.getElementById('examples');
  if (sel.value && EXAMPLES[sel.value]) {
    document.getElementById('code').value = EXAMPLES[sel.value];
    sel.value = '';
  }
}

async function compileAndRun() {
  const btn = document.getElementById('btn-run');
  const out = document.getElementById('output');
  const stats = document.getElementById('stats');
  const userCode = document.getElementById('code').value;

  btn.disabled = true;
  out.textContent = 'Compiling...';
  stats.innerHTML = '';

  if (!compilerReady) await loadCompiler();

  try {
    /* Phase 8: ax2 interprets wasm_emit.ax, which compiles user code to WASM */
    AX2.BUILTINS.__user_src = () => userCode;
    const fullSrc = stdlibSrc + '\nshow wasm_from_src(__user_src())';

    const t0 = performance.now();
    const result = AX2.run(fullSrc);
    const t1 = performance.now();

    if (result.error) {
      out.textContent = 'Compile error: ' + result.error;
      btn.disabled = false;
      return;
    }

    /* Extract WASM bytes from last show output */
    const lastOut = result.output[result.output.length - 1];
    if (!lastOut || !lastOut.arr) {
      out.textContent = 'Error: compiler did not produce WASM bytes';
      btn.disabled = false;
      return;
    }
    const wasmBytes = new Uint8Array(lastOut.arr.map(b => Math.floor(typeof b === 'number' ? b : 0)));

    /* Instantiate WASM */
    const lines = [];
    let memory;
    const t2 = performance.now();
    const wasm = await WebAssembly.instantiate(wasmBytes.buffer, {
      env: {
        show_int: v => { lines.push(String(v)); return v; },
        show_str: ptr => {
          const mem = new Uint32Array(memory.buffer);
          const len = mem[ptr / 4];
          let s = '';
          for (let i = 0; i < len; i++) s += String.fromCharCode(mem[ptr / 4 + 1 + i]);
          lines.push(s);
          return ptr;
        }
      }
    });
    memory = wasm.instance.exports.memory;
    const t3 = performance.now();

    /* Execute */
    if (wasm.instance.exports._main) wasm.instance.exports._main();
    const t4 = performance.now();

    out.textContent = lines.length > 0 ? lines.join('\n') : '(no output)';
    stats.innerHTML =
      '<span class="stat">WASM: ' + wasmBytes.length + ' bytes</span>' +
      '<span class="stat">Compile: ' + (t1-t0).toFixed(0) + 'ms</span>' +
      '<span class="stat">Instantiate: ' + (t3-t2).toFixed(1) + 'ms</span>' +
      '<span class="stat">Execute: ' + (t4-t3).toFixed(2) + 'ms</span>';
  } catch(e) {
    out.textContent = 'Error: ' + e.message + (e.stack ? '\n' + e.stack.split('\n').slice(0,3).join('\n') : '');
  }
  btn.disabled = false;
}

/* Preload compiler on page load */
loadCompiler();
</script>
<script src="nav.js" defer></script>
</body>
</html>
