<!DOCTYPE html>
<!-- ☠️ SCAFFOLDING — dies when WASI DOM access ships in browsers.
     ~30L JS bootstrap: loads site.wasm, provides DOM import handlers.
     This is the LAST non-.ax code. .ax talks to browser directly via these imports. -->
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>antonlebed.com</title><link rel="icon" href="/favicon.png"><meta property="og:image" content="https://antonlebed.com/og-image.jpg"><meta property="og:type" content="website"><meta property="og:site_name" content="antonlebed.com"></head>
<body>
<script>
/* ☠️ DOM import handlers — JS side of WASM DOM imports */
var _domId = 0, _dom = {0: document.body};
function readStr(mem, ptr) {
  var m = new Int32Array(mem.buffer), n = m[ptr/4], s = '';
  for (var i = 0; i < n; i++) s += String.fromCharCode(m[ptr/4+1+i]);
  return s;
}
(async function() {
  var mem = null;
  function rs(p) { return readStr(mem, p); }
  var wasm = await WebAssembly.instantiate(await (await fetch('/site.wasm')).arrayBuffer(), { env: {
    show_int: function(v) { console.log(v); return v; },
    show_str: function(p) { console.log(rs(p)); return p; },
    show_float: function(v) { console.log(v); return 0; },
    sin_f: Math.sin, cos_f: Math.cos, PI_f: function() { return Math.PI; }, exp_f: Math.exp,
    /* Game/ring import stubs — needed because coupling() etc. in interactive widgets triggers ALL game imports */
    canvas_clear: function() { return 0; }, canvas_rect: function() { return 0; },
    canvas_circle: function() { return 0; }, canvas_line: function() { return 0; },
    canvas_pixel: function() { return 0; }, canvas_text: function() { return 0; },
    canvas_width: function() { return 800; }, canvas_height: function() { return 600; },
    mouseX: function() { return 0; }, mouseY: function() { return 0; },
    mouseClick: function() { return 0; }, keyPressed: function() { return 0; },
    now_ms: function() { return Date.now(); },
    beep: function() { return 0; }, playNote: function() { return 0; }, stopSound: function() { return 0; },
    gvar: function() { return 0; }, svar: function() { return 0; },
    gvar_f: function() { return 0; }, svar_f: function() { return 0; },
    set_ring: function() { return 0; },
    coupling: function(n) { var N=970200; n=((n%N)+N)%N; function g(a,b){while(b){var t=b;b=a%b;a=t;}return a;} return N/g(n||N,N); },
    kingdom: function(n) { var N=970200; n=((n%N)+N)%N; if(n===0) return 0; var ps=[2,3,5,7,11]; for(var i=0;i<5;i++) if(n%ps[i]===0) return ps[i]; return 1; },
    eigenvalue: function(n) { var N=970200,qs=[8,9,25,49,11]; n=((n%N)+N)%N; var t=0; for(var i=0;i<5;i++) t+=2*Math.cos(2*Math.PI*(n%qs[i])/qs[i]); return Math.round(t*1000); },
    mirror: function(n) { return ((970200-(n%970200))%970200); },
    crt_r: function(n,c) { var qs=[8,9,25,49,11]; return ((n%970200)+970200)%970200%qs[c]; },
    rand: function(n) { return Math.floor(Math.random()*n); },
    grid: function() { return 0; }, gset: function() { return 0; },
    show_grid: function() { return 0; }, hflip: function() { return 0; },
    vflip: function() { return 0; }, rot90: function() { return 0; },
    transpose: function() { return 0; }, grid_eq: function() { return 0; },
    dom_create: function(p) { var el = document.createElement(rs(p)); _dom[++_domId] = el; return _domId; },
    dom_text: function(h, p) { var el=_dom[h]; if(el){var s=rs(p);el.textContent=s;if(el.tagName==='TEXTAREA'||el.tagName==='INPUT')el.value=s;} return 0; },
    dom_attr: function(h, np, vp) { if (_dom[h]) _dom[h].setAttribute(rs(np), rs(vp)); return 0; },
    dom_style: function(h, pp, vp) { if (_dom[h]) _dom[h].style[rs(pp)] = rs(vp); return 0; },
    dom_append: function(ph, ch) { if (_dom[ph] && _dom[ch]) _dom[ph].appendChild(_dom[ch]); return 0; },
    dom_body: function() { return 0; },
    dom_inner: function(h, p) { if (_dom[h]) _dom[h].innerHTML = rs(p); return 0; },
    dom_on: function(h, ep, fnp) { if (_dom[h]) { var e = rs(ep), f = rs(fnp); _dom[h].addEventListener(e, function() { if (wasm.instance.exports[f]) wasm.instance.exports[f](); }); } return 0; },
    dom_on1: function(h, ep, fnp) { if (_dom[h]) { var e = rs(ep), f = rs(fnp); _dom[h].addEventListener(e, function(ev) { if (wasm.instance.exports[f]) wasm.instance.exports[f](ev.keyCode || ev.which || ev.button || 0); }); } return 0; },
    dom_on2: function(h, ep, fnp) { if (_dom[h]) { var e = rs(ep), f = rs(fnp); _dom[h].addEventListener(e, function(ev) { if (wasm.instance.exports[f]) wasm.instance.exports[f](ev.offsetX || 0, ev.offsetY || 0); }); } return 0; },
    dom_window: function(ep, fnp) { var e = rs(ep), f = rs(fnp); window.addEventListener(e, function() { if (wasm.instance.exports[f]) wasm.instance.exports[f](); }); return 0; },
    dom_query: function(p) { var s = rs(p); try { var el = document.querySelector(s); } catch(e) { return -1; } if (el) { _dom[++_domId] = el; return _domId; } return -1; },
    dom_head_meta: function(np, vp) { var m = document.createElement('meta'); m.name = rs(np); m.content = rs(vp); document.head.appendChild(m); return 0; },
    get_hash: function() {
      /* Real URL routing: /category/page → extract page slug */
      var parts = location.pathname.split('/').filter(Boolean);
      var h = parts.length >= 2 ? parts[parts.length - 1] : (parts[0] || 'home');
      /* Fallback: hash routing for backward compat */
      if (location.hash.length > 1) h = location.hash.slice(1);
      var ptr = 900000;
      var m = new Int32Array(mem.buffer);
      m[ptr/4] = h.length;
      for (var i = 0; i < h.length; i++) m[ptr/4+1+i] = h.charCodeAt(i);
      return ptr;
    },
    dom_value: function(h) {
      var v = (_dom[h] && (_dom[h].value || _dom[h].textContent)) || '';
      var ptr = 904000, m = new Int32Array(mem.buffer);
      m[ptr/4] = v.length;
      for (var i = 0; i < v.length; i++) m[ptr/4+1+i] = v.charCodeAt(i);
      return ptr;
    },
    /* ☠️ SCAFFOLDING — repl_eval: compile+run .ax code, write output to element.
       Dies when .ax gets runtime evaluation (COMPILATION/RUNTIME COLLAPSE). */
    repl_eval: function(cp, rh) {
      var code = rs(cp), el = _dom[rh]; if (!el) return 0;
      el.innerHTML = '<p style="color:#999">Compiling...</p>';
      setTimeout(function() { _replRun(code, el); }, 0);
      return 0;
    }
  }});
  mem = wasm.instance.exports.memory;
  wasm.instance.exports._main();
})();
/* ☠️ SCAFFOLDING — REPL evaluation engine. Loads deep_ouroboros.wasm (compiler),
   compiles .ax source to WASM, instantiates, runs, captures output.
   Dies when .ax gets runtime evaluation. */
var _cMod = null, _N = 970200;
function _gcd(a,b) { while(b) { var t = b; b = a % b; a = t; } return a; }
async function _replRun(code, el) {
  try {
    if (!_cMod) {
      el.innerHTML = '<p style="color:#999">Loading compiler (first run)...</p>';
      var r = await fetch('/deep_ouroboros.wasm');
      _cMod = await WebAssembly.compile(await r.arrayBuffer());
    }
    /* Prelude: constants + utility fns so user code has Decality names */
    var pre = 'let o=0\nlet s=1\nlet D=2\nlet K=3\nlet E=5\nlet b=7\nlet L=11\nlet GATE=13\nlet OMEGA=606376\n';
    pre += 'let DATA=210\nlet THIN=2310\nlet HYDOR=105\nlet LAMBDA=420\nlet KEY=41\nlet ANSWER=42\n';
    pre += 'fn gcd(a,b)=if b==0 then a else gcd(b,a%b)\n';
    pre += 'fn decompose(n)=[n%8,n%9,n%25,n%49,n%11]\n';
    pre += 'fn reconstruct(arr)=arr[0]*363825+arr[1]*431200+arr[2]*853776+arr[3]*732600+arr[4]*529200\n';
    pre += 'fn crt(n)="(" + "${n%8}" + "," + "${n%9}" + "," + "${n%25}" + "," + "${n%49}" + "," + "${n%11}" + ")"\n';
    code = pre + code;
    /* Fresh compiler instance (clean heap, ~1ms from cached module) */
    var cm = (await WebAssembly.instantiate(_cMod, {
      env: { show_int: function(v){return v;}, show_str: function(p){return p;} }
    })).exports;
    cm.memory.grow(Math.max(0, 512 - cm.memory.buffer.byteLength / 65536));
    var m32 = new Int32Array(cm.memory.buffer), addr = 15*1024*1024;
    m32[addr/4] = code.length;
    for (var i = 0; i < code.length; i++) m32[addr/4+1+i] = code.charCodeAt(i);
    var bp = cm.wasm_from_src(addr);
    m32 = new Int32Array(cm.memory.buffer);
    var bl = m32[bp/4], wb = new Uint8Array(bl);
    for (var j = 0; j < bl; j++) wb[j] = m32[bp/4+1+j];
    if (!WebAssembly.validate(wb)) { el.innerHTML = '<pre style="color:#ff6666">Compilation error: invalid WASM ('+bl+' bytes)</pre>'; return; }
    /* Instantiate + run the compiled program */
    var lines = [], childMem;
    function rcs(p) { var cm32=new Int32Array(childMem.buffer),n=cm32[p/4],s='';for(var k=0;k<n;k++)s+=String.fromCharCode(cm32[p/4+1+k]);return s; }
    var qs = [8,9,25,49,11];
    /* Import names MUST match wasm_emit.ax exactly: base(2) + float(5) + game(35) */
    var child = await WebAssembly.instantiate(wb.buffer, { env: {
      /* Base imports (indices 0-1) */
      show_int: function(v) { lines.push(''+v); return v; },
      show_str: function(p) { lines.push(rcs(p)); return p; },
      /* Float imports (indices 2-6 when floats detected) */
      show_float: function(v) { lines.push(''+v); return 0; },
      sin_f:Math.sin, cos_f:Math.cos, PI_f:function(){return Math.PI;}, exp_f:Math.exp,
      /* Game imports (35 total, indices 7-41 when game detected) — names from wasm_emit.ax game_name() */
      canvas_clear:function(){return 0;}, canvas_rect:function(){return 0;},
      canvas_circle:function(){return 0;}, canvas_line:function(){return 0;},
      canvas_pixel:function(){return 0;}, canvas_text:function(){return 0;},
      canvas_width:function(){return 800;}, canvas_height:function(){return 600;},
      mouseX:function(){return 0;}, mouseY:function(){return 0;},
      mouseClick:function(){return 0;}, keyPressed:function(){return 0;},
      now_ms:function(){return Date.now();},
      beep:function(){return 0;}, playNote:function(){return 0;}, stopSound:function(){return 0;},
      gvar:function(){return 0;}, svar:function(){return 0;},
      gvar_f:function(){return 0;}, svar_f:function(){return 0;},
      set_ring:function(){return 0;},
      coupling: function(n) { n=((n%_N)+_N)%_N; return _N/_gcd(n||_N,_N); },
      kingdom: function(n) { n=((n%_N)+_N)%_N; if(n===0) return 0; var ps=[2,3,5,7,11]; for(var i=0;i<5;i++) if(n%ps[i]===0) return ps[i]; return 1; },
      eigenvalue: function(n) { n=((n%_N)+_N)%_N; var t=0; for(var i=0;i<5;i++) t+=2*Math.cos(2*Math.PI*(n%qs[i])/qs[i]); return Math.round(t*1000); },
      mirror: function(n) { return ((970200-(n%970200))%970200); },
      crt_r: function(n,c) { return ((n%_N)+_N)%_N%qs[c]; },
      rand:function(n){return Math.floor(Math.random()*n);},
      grid:function(){return 0;}, gset:function(){return 0;},
      show_grid:function(){return 0;}, hflip:function(){return 0;},
      vflip:function(){return 0;}, rot90:function(){return 0;},
      transpose:function(){return 0;}, grid_eq:function(){return 0;}
    }});
    childMem = child.instance.exports.memory;
    child.instance.exports._main();
    var out = lines.join('\n').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    el.innerHTML = lines.length ? '<pre style="color:#88ddaa;white-space:pre-wrap;margin:0">'+out+'</pre>'
      : '<p style="color:#999;margin:0">No output (use show to display values)</p>';
  } catch(e) {
    var msg = (e.message||''+e).replace(/&/g,'&amp;').replace(/</g,'&lt;');
    el.innerHTML = '<pre style="color:#ff6666;margin:0">Error: '+msg+'</pre>';
  }
}
</script>
</body>
</html>
